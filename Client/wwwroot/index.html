<!DOCTYPE html>
<html lang=""en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAuth Lab Client Page (BFF with Web Components)</title>
    <link rel="preconnect" href=""https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- Note: type="module" elements are automatically deferred and loaded after the document is parsed, no need to wait for DOMContentLoaded-->
     <!--Note: type="module" also gives each file its own scope, so globally declared variables in those files are not leaked into other files or into window-->
    <script type="module" src="/components/app-shell.js"></script>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0F1117;
            color: #E0E0F0;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        header {
            border-bottom: 1px solid #2A2D3A;
            padding: 0 32px;
        }

        .header-inner {
            max-width: 960px;
            margin: 0 auto;
            display: flex;
            align-items: baseline;
            gap: 14px;
            padding: 20px 0;
        }

        .wordmark {
            font-family: 'JetBrains Mono', monospace;
            font-size: 15px;
            font-weight: 500;
            color: #E0E0F0;
            letter-spacing: -0.01em;
        }

        .wordmark span {
            color: #7C6AFE;
        }

        .tagline {
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            color: #4A4D5E;
            letter-spacing: 0.02em;
        }

        main {
            max-width: 960px;
            margin: 0 auto;
            padding: 0 32px 64px;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-inner">
            <div class="wordmark">oauth<span>.</span>lab</div>
            <div class="tagline">Learn about OAuth2.0 and OIDC flows!</div>
        </div>
    </header>
    <main>
        <app-shell></app-shell>
    </main>
</body>
</html>
