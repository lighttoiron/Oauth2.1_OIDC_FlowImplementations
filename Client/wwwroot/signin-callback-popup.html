<!DOCTYPE html>
<html>
<head>
    <title>Signing In...</title>
</head>
<body>
    <p>Completing Sign In...</p>
    <script>
        // This page is loaded as a popup and gets the authorization code for the user, passing it back to the SPA client page
        // We use a BroadcastChannel rather than posting a message to our window.opener handle because modern Cross-Origin-Opener-Policies
        //  can remove the context of a window making CORS requests
        const params = new URLSearchParams(window.location.search);

        const channel = new BroadcastChannel('oauth_callback');
        channel.postMessage({
            code: params.get('code'),
            state: params.get('state'),
            error: params.get('error')
        })
        channel.close();

        window.close();
    </script>
</body>
</html>
